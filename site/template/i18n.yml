# 全部 UI 文案的唯一出处（key -> {zh, en}）。模板与图表 spec 只引用 key，不写文案。
# 约定（详见 docs/frontend.md「i18n」）：
#   - key 扁平、点分命名空间：ui.* / sec.* / panel.* / chart.* / meth.*
#   - 模板：{{ t(key) }} 渲染构建期默认语言（zh），同一元素标注
#     data-i18n / data-i18n-html / data-i18n-title / data-i18n-aria-label
#     （参数化文案配 data-i18n-args，值里用 {name} 占位），app.js 运行期按当前语言重渲染
#   - 图表 spec：build.py 的 L(key) 生成 "__i18n:<key>" 占位符，app.js 渲染时解析（同 __surface）
#   - data-i18n-html 的值是受信 HTML（innerHTML 注入），只允许 <b>/<code> 级内联标签
#   - 每个 key 必须 zh/en 齐全；tests/test_i18n.py 校验完整性、{args} 双语一致、无死 key

