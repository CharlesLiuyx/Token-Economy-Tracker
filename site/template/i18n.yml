# ---- Methodology（受信 HTML）----
meth.title:
  zh: Methodology — 每个面板测的是什么、不是什么
  en: Methodology — what each panel measures, and what it doesn't
meth.arr:
  zh: <b>01 ARR</b>：披露锚点（run-rate 口径）对数空间加权最小二乘拟合 + 外推。大数字是
    <b>估算的演出效果</b>（每秒按拟合小时增量累加），非实时财务数据；置信带与锚点散点展示估算地基。
    锚点混入全年预测/实际收入会被拒绝（口径字段强制）。
  en: "<b>01 ARR</b>: weighted least-squares fit in log space over disclosed run-rate
    anchors, plus extrapolation. The big number is a <b>dramatized estimate</b>
    (incremented every second at the fitted hourly rate), not live financials; the
    confidence band and anchor dots show the estimate's foundation. Anchors mixing in
    full-year forecast/actual revenue are rejected (metric field enforced)."
meth.openrouter:
  zh: <b>02 OpenRouter</b>：聚合路由平台切片，<b>不含</b> Anthropic/OpenAI 直连 API 主力流量。
    「滚动 7 天」为端点原生口径；日频序列由本站每日快照累积。
  en: "<b>02 OpenRouter</b>: an aggregator-platform slice that <b>excludes</b> the bulk
    of Anthropic/OpenAI direct API traffic. 'Rolling 7 days' is the endpoint's native
    window; daily series are accumulated from this site's own snapshots."
meth.vercel:
  zh: <b>02 Vercel Gateway</b>：仅 Gateway 客户流量的<b>份额百分比</b>，无绝对量；模型名为显示名。
  en: "<b>02 Vercel Gateway</b>: <b>share percentages</b> of Gateway-customer traffic
    only, no absolute volumes; model names are display names."
meth.sdk:
  zh: <b>02 SDK 下载</b>：npm/PyPI 官方 API；下载量是开发者采用度 proxy（CI 重复安装会灌水），
    不等于 API 调用量。
  en: "<b>02 SDK downloads</b>: official npm/PyPI APIs; downloads are a developer-adoption
    proxy (inflated by repeated CI installs), not API call volume."
meth.gpu:
  zh: <b>03 GPU 价格</b>：Vast.ai 市场 on-demand 报价分位数（含个人/小机房供给的低价切片），
    系统性低于超算云牌价，不可与 OCPI 等跨供应商指数直接比较。
  en: "<b>03 GPU prices</b>: quantiles of on-demand asks on the Vast.ai marketplace (a
    budget slice incl. hobbyist/small-DC supply), systematically below hyperscaler list
    prices; not directly comparable to cross-vendor indices like OCPI."
meth.dc:
  zh: <b>04 数据中心</b>：Epoch AI Frontier Data Centers 数据集（CC-BY，约每周更新），
    为样本内站点，非全行业普查。新闻流为 Google News RSS 白名单媒体，仅标题/链接。
  en: "<b>04 Datacenters</b>: Epoch AI Frontier Data Centers dataset (CC-BY, updated
    ~weekly) — in-sample sites, not an industry census. News feed is Google News RSS
    from whitelisted outlets, titles/links only."

